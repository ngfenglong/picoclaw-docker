services:

  # ─────────────────────────────────────────────
  # Ollama — LLM backend (local model, no API key needed)
  #   Uncomment this entire block to use Ollama instead of OpenAI.
  #   Also uncomment the ollama-init service and the ollama-models volume.
  #   Port 11434 is exposed for local testing only — remove on VPS.
  # ─────────────────────────────────────────────
  # ollama:
  #   image: ollama/ollama
  #   container_name: ollama
  #   volumes:
  #     - ollama-models:/root/.ollama
  #   ports:
  #     - "11434:11434"
  #   healthcheck:
  #     test: ["CMD-SHELL", "ollama list"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 12
  #     start_period: 15s
  #   restart: unless-stopped

  # ─────────────────────────────────────────────
  # Ollama Init — pulls the model once then exits
  #   Uncomment to use with Ollama. Change the model name as needed.
  # ─────────────────────────────────────────────
  # ollama-init:
  #   image: ollama/ollama
  #   container_name: ollama-init
  #   depends_on:
  #     ollama:
  #       condition: service_healthy
  #   environment:
  #     - OLLAMA_HOST=http://ollama:11434
  #   entrypoint: ["ollama", "pull", "qwen2.5:0.5b"]
  #   restart: "no"

  # ─────────────────────────────────────────────
  # PicoClaw Gateway — agent orchestration layer
  #   Workspace is bind-mounted so you can edit persona files directly:
  #     workspace/IDENTITY.md — who the agent is
  #     workspace/SOUL.md     — personality and tone
  #     workspace/USER.md     — info about you
  #     workspace/HEARTBEAT.md — tasks to run every 30 min
  #
  #   When using Ollama, restore the depends_on block:
  #     depends_on:
  #       ollama-init:
  #         condition: service_completed_successfully
  # ─────────────────────────────────────────────
  picoclaw-gateway:
    image: docker.io/sipeed/picoclaw:latest
    container_name: picoclaw-gateway
    volumes:
      - ./config/config.json:/root/.picoclaw/config.json:ro
      - ./workspace:/root/.picoclaw/workspace
    restart: unless-stopped

volumes:
  ollama-models: # uncomment when using Ollama
